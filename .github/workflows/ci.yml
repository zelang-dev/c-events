name: Windows & Ubuntu & macOS x86_64
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            flags: -m64
    steps:
      - uses: actions/checkout@v4
      - name: Prepare
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -q -y
          sudo apt-get install -y gcc-multilib g++-multilib libc6-dbg libc6-dbg:i386
      - name: Configure & build
        run: |
            mkdir build
            cd build
            cmake -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DCMAKE_C_FLAGS=${{ matrix.flags }} ..
            cmake --build .
      - name: Run tests
        run: |
            cd build
            ctest -C Debug --output-on-failure -F

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
            mkdir build
            cd build
            cmake .. -DBUILD_TESTS=ON -A ${{ matrix.arch }}
            cmake --build . --config Debug
      - name: Run tests
        shell: cmd
        run: |
            cd build
            ctest -C Debug --output-on-failure -F

  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-15-intel]
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
            mkdir build
            cd build
            cmake -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON ..
            cmake --build .
      - name: Run tests & Disable Firewall
        if: ${{ matrix.os == 'macos-15' || matrix.os == 'macos-14' }}
        run: |
          /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate
          sudo defaults write /Library/Preferences/com.apple.alf globalstate -int 0
          /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate
          cd build && sudo ctest -C Debug --output-on-failure -F
      - name: Run tests
        if: ${{ matrix.os == 'macos-15-intel' }}
        run: |
            cd build
            ctest -C Debug --output-on-failure -F
